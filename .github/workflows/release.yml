name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja release (np. v1.4.1)'
        required: true
        type: string
      prerelease:
        description: 'Oznacz jako pre-release?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_notes:
        description: 'Notatki do release (opcjonalne)'
        required: false
        type: string

jobs:
  build:
    name: Kompilacja AHK i tworzenie release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustal wersje
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
            if (-not $ver.StartsWith("v")) { $ver = "v$ver" }
            echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
            echo "IS_PRERELEASE=${{ github.event.inputs.prerelease }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $env:GITHUB_OUTPUT
          }

      - name: Utworz tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $existing = git tag -l $ver
          if (-not $existing) {
            git tag $ver
            git push origin $ver
            Write-Host "Tag $ver utworzony."
          } else {
            Write-Host "Tag $ver juz istnieje."
          }

      - name: Zainstaluj AutoHotkey v2
        shell: cmd
        run: choco install autohotkey --version=2.0.19 -y --no-progress

      - name: Kompiluj makro
        shell: pwsh
        run: |
          $compiler = Get-ChildItem "C:\Program Files\AutoHotkey\" -Recurse -Filter "Ahk2Exe.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $compiler) {
            $compiler = Get-ChildItem "C:\ProgramData\chocolatey\" -Recurse -Filter "Ahk2Exe.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $compiler) {
            Write-Error "Nie znaleziono Ahk2Exe.exe!"
            Get-ChildItem "C:\Program Files\AutoHotkey\" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }

          Write-Host "Kompilator: $compiler"
          & $compiler /in "SlapBattlesMultiMacro.ahk" /out "SlapBattlesMultiMacro.exe" /compress 2

          if (!(Test-Path "SlapBattlesMultiMacro.exe")) {
            Write-Error "Kompilacja nie powiodla sie!"
            exit 1
          }
          Write-Host "OK - SlapBattlesMultiMacro.exe gotowy."

      - name: Przygotuj notatki release
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $custom = "${{ github.event.inputs.release_notes }}"
          if ($custom) {
            $custom | Out-File -FilePath "release_notes.md" -Encoding utf8
          } else {
            $body = "## Slap Battles Multi Macro $ver`n`n"
            $body += "### Instalacja`n"
            $body += "1. Pobierz ``SlapBattlesMultiMacro.exe```n"
            $body += "2. Uruchom i zaakceptuj Warunki Uzytkowania`n"
            $body += "3. Wpisz klucz licencyjny (otrzymasz od administratora)`n"
            $body += "4. Poczekaj na aktywacje HWID`n"
            $body += "5. Uruchom ponownie i wybierz modul`n`n"
            $body += "### Wymagania`n"
            $body += "- Windows 10 / 11`n"
            $body += "- Roblox uruchomiony przed startem makra`n`n"
            $body += "> Plik exe zawiera wbudowane srodowisko AutoHotkey - nie wymaga instalacji AHK."
            $body | Out-File -FilePath "release_notes.md" -Encoding utf8
          }

      - name: Utworz Release i wgraj exe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $pre = "${{ steps.version.outputs.IS_PRERELEASE }}"

          gh release delete $ver --yes 2>$null

          if ($pre -eq "true") {
            gh release create $ver "SlapBattlesMultiMacro.exe" `
              --title "Slap Battles Multi Macro $ver" `
              --notes-file "release_notes.md" `
              --prerelease
          } else {
            gh release create $ver "SlapBattlesMultiMacro.exe" `
              --title "Slap Battles Multi Macro $ver" `
              --notes-file "release_notes.md"
          }
