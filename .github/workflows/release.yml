name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja release (np. v1.4.2)'
        required: true
        type: string
      prerelease:
        description: 'Oznacz jako pre-release?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_notes:
        description: 'Notatki do release (opcjonalne)'
        required: false
        type: string

jobs:
  release:
    name: Tworzenie release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustal wersje
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ github.event.inputs.version }}"
            [[ "$ver" != v* ]] && ver="v$ver"
            echo "VERSION=$ver" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Utworz tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --tags origin "refs/tags/$ver" | grep -q "$ver"; then
            git tag "$ver"
            git push origin "$ver"
            echo "Tag $ver utworzony."
          else
            echo "Tag $ver juz istnieje."
          fi

      - name: Przygotuj notatki release
        run: |
          ver="${{ steps.version.outputs.VERSION }}"
          custom="${{ github.event.inputs.release_notes }}"
          if [ -n "$custom" ]; then
            printf '%s' "$custom" > release_notes.md
          else
            cat > release_notes.md << 'NOTES'
          ### Instalacja
          1. Zainstaluj **[AutoHotkey v2](https://www.autohotkey.com/)** jeśli jeszcze nie masz
          2. Pobierz `SlapBattlesMultiMacro.ahk`
          3. Uruchom i zaakceptuj Warunki Użytkowania
          4. Wpisz klucz licencyjny (otrzymasz od administratora)
          5. Poczekaj na aktywację HWID przez admina
          6. Uruchom ponownie i wybierz moduł

          ### Wymagania
          - Windows 10 / 11
          - AutoHotkey v2.0+
          - Roblox uruchomiony przed startem makra
          NOTES
            # Add version header at top
            printf "## Slap Battles Multi Macro $ver\n\n$(cat release_notes.md)" > release_notes.md
          fi

      - name: Utwórz Release i wgraj plik AHK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${{ steps.version.outputs.VERSION }}"
          pre="${{ steps.version.outputs.IS_PRERELEASE }}"

          gh release delete "$ver" --yes 2>/dev/null || true

          if [ "$pre" = "true" ]; then
            gh release create "$ver" "SlapBattlesMultiMacro.ahk" \
              --title "Slap Battles Multi Macro $ver" \
              --notes-file "release_notes.md" \
              --prerelease
          else
            gh release create "$ver" "SlapBattlesMultiMacro.ahk" \
              --title "Slap Battles Multi Macro $ver" \
              --notes-file "release_notes.md"
          fi
