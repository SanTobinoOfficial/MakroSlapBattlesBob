name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja release (np. v1.4.1)'
        required: true
        type: string
      prerelease:
        description: 'Oznacz jako pre-release?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_notes:
        description: 'Notatki do release (opcjonalne)'
        required: false
        type: string

jobs:
  build:
    name: Kompilacja AHK i tworzenie release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustal wersje
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
            if (-not $ver.StartsWith("v")) { $ver = "v$ver" }
            echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
            echo "IS_PRERELEASE=${{ github.event.inputs.prerelease }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $env:GITHUB_OUTPUT
          }

      - name: Utworz tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $existing = git tag -l $ver
          if (-not $existing) {
            git tag $ver
            git push origin $ver
            Write-Host "Tag $ver utworzony."
          } else {
            Write-Host "Tag $ver juz istnieje."
          }

      - name: Zainstaluj AutoHotkey v2 i Ahk2Exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "C:\AHK2" -Force | Out-Null

          Write-Host "Pobieranie AutoHotkey64.exe..."
          $ahkUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19.zip"
          Invoke-WebRequest -Uri $ahkUrl -OutFile "ahk.zip" -UseBasicParsing
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("ahk.zip")
          $entry = $zip.Entries | Where-Object { $_.Name -eq "AutoHotkey64.exe" } | Select-Object -First 1
          [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, "C:\AHK2\AutoHotkey64.exe", $true)
          $zip.Dispose()

          Write-Host "Pobieranie Ahk2Exe..."
          $a2eUrl = "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.02a0a/Ahk2Exe1.1.37.02a0.zip"
          Invoke-WebRequest -Uri $a2eUrl -OutFile "ahk2exe.zip" -UseBasicParsing
          $zip2 = [System.IO.Compression.ZipFile]::OpenRead("ahk2exe.zip")
          $entry2 = $zip2.Entries | Where-Object { $_.Name -eq "Ahk2Exe.exe" } | Select-Object -First 1
          [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry2, "C:\AHK2\Ahk2Exe.exe", $true)
          $zip2.Dispose()

          Write-Host "Gotowe:"
          Get-ChildItem "C:\AHK2\"

      - name: Kompiluj makro
        shell: pwsh
        run: |
          $compiler = "C:\AHK2\Ahk2Exe.exe"
          $ahk = "C:\AHK2\AutoHotkey64.exe"

          if (-not (Test-Path $compiler)) {
            Write-Error "Nie znaleziono Ahk2Exe.exe!"
            exit 1
          }

          Write-Host "Kompilator: $compiler"
          Write-Host "Interpreter: $ahk"

          & $compiler /in "SlapBattlesMultiMacro.ahk" /out "SlapBattlesMultiMacro.exe" /ahk "$ahk"
          Write-Host "Ahk2Exe exit code: $LASTEXITCODE"

          if (!(Test-Path "SlapBattlesMultiMacro.exe")) {
            Write-Host "Proba bez /ahk..."
            & $compiler /in "SlapBattlesMultiMacro.ahk" /out "SlapBattlesMultiMacro.exe"
            Write-Host "Ahk2Exe exit code (2): $LASTEXITCODE"
          }

          if (!(Test-Path "SlapBattlesMultiMacro.exe")) {
            Write-Error "Kompilacja nie powiodla sie!"
            exit 1
          }
          Write-Host "OK - SlapBattlesMultiMacro.exe gotowy."

      - name: Przygotuj notatki release
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $custom = "${{ github.event.inputs.release_notes }}"
          if ($custom) {
            $custom | Out-File -FilePath "release_notes.md" -Encoding utf8
          } else {
            $body = "## Slap Battles Multi Macro $ver`n`n"
            $body += "### Instalacja`n"
            $body += "1. Pobierz ``SlapBattlesMultiMacro.exe```n"
            $body += "2. Uruchom i zaakceptuj Warunki Uzytkowania`n"
            $body += "3. Wpisz klucz licencyjny (otrzymasz od administratora)`n"
            $body += "4. Poczekaj na aktywacje HWID`n"
            $body += "5. Uruchom ponownie i wybierz modul`n`n"
            $body += "### Wymagania`n"
            $body += "- Windows 10 / 11`n"
            $body += "- Roblox uruchomiony przed startem makra`n`n"
            $body += "> Plik exe zawiera wbudowane srodowisko AutoHotkey - nie wymaga instalacji AHK."
            $body | Out-File -FilePath "release_notes.md" -Encoding utf8
          }

      - name: Utworz Release i wgraj exe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $pre = "${{ steps.version.outputs.IS_PRERELEASE }}"

          gh release delete $ver --yes 2>$null

          if ($pre -eq "true") {
            gh release create $ver "SlapBattlesMultiMacro.exe" `
              --title "Slap Battles Multi Macro $ver" `
              --notes-file "release_notes.md" `
              --prerelease
          } else {
            gh release create $ver "SlapBattlesMultiMacro.exe" `
              --title "Slap Battles Multi Macro $ver" `
              --notes-file "release_notes.md"
          }
