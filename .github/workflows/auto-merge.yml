name: Auto-merge claude/* branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    name: Merge do main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Konfiguracja git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge brancha do main
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Merguje $BRANCH -> main"
          git checkout main
          git pull origin main
          git merge --no-ff "origin/$BRANCH" -m "Auto-merge: $BRANCH -> main"
          git push origin main

      - name: Utwórz tag jeśli wersja się zmieniła
        run: |
          VERSION=$(grep 'APP_VERSION :=' SlapBattlesMultiMacro.ahk | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "Nie znaleziono wersji w pliku AHK — pomijam tag."
            exit 0
          fi
          echo "Wersja w pliku: $VERSION"
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
            echo "Tag $VERSION już istnieje — pomijam."
          else
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Tag $VERSION utworzony i wypchnięty."
          fi
